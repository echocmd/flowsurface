services:
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: flowsurface-clickhouse
    ports:
      - "8123:8123"   # HTTP interface (used by Flowsurface)
      - "9000:9000"   # Native TCP interface (optional, for clickhouse-client)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: opendeviationbar_cache
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clickhouse-data:
